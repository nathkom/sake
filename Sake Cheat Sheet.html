<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sake — service cheat sheet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="sake-style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="left">
        <div class="search" id="search">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <circle cx="7" cy="7" r="5" stroke="#9a9690" stroke-width="1.4" />
            <path
              d="M11 11l3 3"
              stroke="#9a9690"
              stroke-width="1.4"
              stroke-linecap="round"
            />
          </svg>
          <input id="search-input" />
          <label class="theme-toggle" title="Toggle light/dark mode">
            <input type="checkbox" id="theme-toggle-input" class="theme-toggle-input" />
            <svg class="toggle-icon" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
            <span class="theme-track"><span class="theme-thumb"></span></span>
            <svg class="toggle-icon" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="4"/>
              <line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/>
              <line x1="4.22" y1="4.22" x2="7.05" y2="7.05"/><line x1="16.95" y1="16.95" x2="19.78" y2="19.78"/>
              <line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/>
              <line x1="4.22" y1="19.78" x2="7.05" y2="16.95"/><line x1="16.95" y1="7.05" x2="19.78" y2="4.22"/>
            </svg>
          </label>
        </div>

        <div class="row focused" data-row="r1" data-label="Foundations">
          <div class="tab-strip" data-tabs></div>
          <div class="tab-panel" data-panel></div>
        </div>

        <div class="row" data-row="r2" data-label="Service">
          <div class="tab-strip" data-tabs></div>
          <div class="tab-panel" data-panel></div>
        </div>
      </section>

      <aside class="right">
        <div class="visual" id="visual"></div>
      </aside>
    </main>

    <script src="sake-content.js"></script>
    <script src="sake-app.js"></script>
  </body>
</html>
