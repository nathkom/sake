<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sake — service cheat sheet</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="sake-style.css" />
</head>
<body>

<main class="shell">

  <section class="left">
    <div class="search" id="search">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
        <circle cx="7" cy="7" r="5" stroke="#9a9690" stroke-width="1.4"/>
        <path d="M11 11l3 3" stroke="#9a9690" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <input id="search-input" />
    </div>

    <div class="row focused" data-row="r1" data-label="Foundations">
      <div class="tab-strip" data-tabs></div>
      <div class="tab-panel" data-panel></div>
    </div>

    <div class="row" data-row="r2" data-label="Service">
      <div class="tab-strip" data-tabs></div>
      <div class="tab-panel" data-panel></div>
    </div>
  </section>

  <aside class="right">
    <div class="visual" id="visual"></div>
  </aside>

</main>

<script src="sake-content.js"></script>
<script src="sake-app.js"></script>

</body>
</html>
